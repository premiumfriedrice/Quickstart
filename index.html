<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" id="theme-color" content="#fbfbfa" />
    <meta
      name="description"
      content="A tiny train dispatcher. Click anywhere to send a train chugging across the screen."
    />
    <meta property="og:title" content="welcome to conductor" />
    <meta property="og:description" content="Click anywhere to dispatch a train." />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/png" href="./public/favicon.png" />
    <title>welcome to conductor</title>
    <style>
      :root {
        color-scheme: light dark;
        --ink: #151515;
        --muted: #7a7a7a;
        --faint: #d9d9d9;
        --paper: #fbfbfa;
        --panel: rgba(255, 255, 255, 0.72);
        --panel-hover: #fff;
        --panel-hover-border: #b8b8b8;
        --accent: #111;
        --steam: #c9c9c7;
        --background-counter: #111;
        --background-counter-opacity: 0.045;
        --background-counter-bump-opacity: 0.075;
      }

      :root[data-theme="dark"] {
        color-scheme: dark;
        --ink: #f0f0ee;
        --muted: #9a9a9a;
        --faint: #333332;
        --paper: #111110;
        --panel: rgba(30, 30, 30, 0.78);
        --panel-hover: rgba(44, 44, 44, 0.92);
        --panel-hover-border: #555554;
        --accent: #f0f0ee;
        --steam: #4a4a48;
        --background-counter: #f5f5f3;
        --background-counter-opacity: 0.06;
        --background-counter-bump-opacity: 0.1;
      }

      @media (prefers-color-scheme: dark) {
        :root:not([data-theme="light"]) {
          color-scheme: dark;
          --ink: #f0f0ee;
          --muted: #9a9a9a;
          --faint: #333332;
          --paper: #111110;
          --panel: rgba(30, 30, 30, 0.78);
          --panel-hover: rgba(44, 44, 44, 0.92);
          --panel-hover-border: #555554;
          --accent: #f0f0ee;
          --steam: #4a4a48;
          --background-counter: #f5f5f3;
          --background-counter-opacity: 0.06;
          --background-counter-bump-opacity: 0.1;
        }
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        overflow: hidden;
        background: var(--paper);
        color: var(--ink);
        font-family:
          ui-sans-serif,
          -apple-system,
          BlinkMacSystemFont,
          "SF Pro Text",
          "Helvetica Neue",
          Helvetica,
          Arial,
          sans-serif;
        font-feature-settings: "kern";
      }

      main {
        position: relative;
        display: block;
        width: 100vw;
        min-height: 100svh;
        overflow: hidden;
        cursor: pointer;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }

      .hero {
        position: absolute;
        inset: 0;
        z-index: 2;
        display: grid;
        place-items: center;
        gap: 18px;
        padding: 32px;
        text-align: center;
        transition: opacity 600ms ease;
        pointer-events: none;
      }

      .hero.dispatched {
        opacity: 0;
      }

      .hero-inner {
        display: grid;
        gap: 18px;
        place-items: center;
      }

      .train-emoji {
        display: inline-block;
        font-size: clamp(56px, 10vw, 96px);
        line-height: 1;
        transform-origin: 50% 60%;
        pointer-events: auto;
      }

      .train-emoji:hover {
        animation: wiggle 600ms ease-in-out;
      }

      .tagline {
        max-width: 28ch;
        color: var(--muted);
        font-size: 14px;
        font-weight: 450;
        letter-spacing: 0;
        line-height: 1.5;
      }

      .train {
        position: fixed;
        left: 0;
        z-index: 4;
        font-size: clamp(38px, 6vw, 56px);
        line-height: 1;
        pointer-events: none;
        animation-fill-mode: forwards;
        animation-timing-function: linear;
        will-change: transform;
      }

      .train.ltr {
        animation-name: train-ltr;
      }

      .train.rtl {
        animation-name: train-rtl;
      }

      .steam {
        position: fixed;
        z-index: 3;
        color: var(--steam);
        font-size: 18px;
        pointer-events: none;
        animation: puff 1400ms ease-out forwards;
        will-change: transform, opacity;
      }

      .theme-toggle,
      .mute-toggle {
        position: fixed;
        top: 16px;
        z-index: 10;
        display: inline-flex;
        width: 38px;
        height: 38px;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--faint);
        border-radius: 999px;
        background: var(--panel);
        color: var(--ink);
        cursor: pointer;
        font-size: 16px;
        backdrop-filter: blur(14px);
        transition:
          border-color 150ms ease,
          background 150ms ease,
          transform 150ms ease;
      }

      .theme-toggle:hover,
      .mute-toggle:hover {
        background: var(--panel-hover);
        border-color: var(--panel-hover-border);
        transform: translateY(-1px);
      }

      .theme-toggle:focus-visible,
      .mute-toggle:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
      }

      .theme-toggle {
        right: 62px;
      }

      .mute-toggle {
        right: 16px;
      }

      .counter {
        position: fixed;
        bottom: 16px;
        left: 16px;
        z-index: 10;
        color: var(--muted);
        font-size: 13px;
        font-weight: 450;
        letter-spacing: 0;
        pointer-events: none;
      }

      .background-counter {
        position: fixed;
        inset: 0;
        z-index: 0;
        display: grid;
        place-items: center;
        color: var(--background-counter);
        font-size: clamp(180px, 42vw, 760px);
        font-weight: 900;
        letter-spacing: 0;
        line-height: 0.78;
        opacity: var(--background-counter-opacity);
        pointer-events: none;
        text-align: center;
        transform: translateY(-1.5vh);
        transition:
          opacity 180ms ease,
          transform 240ms ease;
      }

      .background-counter.bump {
        opacity: var(--background-counter-bump-opacity);
        transform: translateY(-1.5vh) scale(1.025);
      }

      @keyframes wiggle {
        0%,
        100% {
          transform: rotate(0);
        }

        25% {
          transform: translateY(-4px) rotate(-6deg);
        }

        75% {
          transform: translateY(-4px) rotate(6deg);
        }
      }

      @keyframes train-ltr {
        from {
          transform: translateX(-15vw) scaleX(-1);
        }

        to {
          transform: translateX(115vw) scaleX(-1);
        }
      }

      @keyframes train-rtl {
        from {
          transform: translateX(115vw);
        }

        to {
          transform: translateX(-15vw);
        }
      }

      @keyframes puff {
        0% {
          opacity: 0.7;
          transform: translate(0, 0) scale(0.8);
        }

        100% {
          opacity: 0;
          transform: translate(0, -40px) scale(1.4);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .hero,
        .train-emoji:hover {
          animation: none;
          transition: none;
        }

        .steam {
          display: none;
        }

        .train.ltr,
        .train.rtl {
          left: 50%;
          animation: fade-blip 1500ms ease both !important;
        }

        @keyframes fade-blip {
          0% {
            opacity: 0;
            transform: translateX(-50%) scale(0.85);
          }

          20%,
          80% {
            opacity: 1;
            transform: translateX(-50%) scale(1);
          }

          100% {
            opacity: 0;
            transform: translateX(-50%) scale(1);
          }
        }
      }
    </style>
  </head>
  <body>
    <main id="dispatcher">
      <div class="hero" id="hero">
        <div class="hero-inner">
          <span class="train-emoji" role="img" aria-label="train">🚂</span>
          <span class="tagline">Click anywhere to dispatch a train.</span>
        </div>
      </div>

      <button
        class="theme-toggle"
        id="theme"
        type="button"
        aria-label="Switch to dark mode"
      >
        🌙
      </button>

      <button
        class="mute-toggle"
        id="mute"
        type="button"
        aria-label="Mute"
        aria-pressed="false"
      >
        🔊
      </button>

      <div class="background-counter" id="background-counter" aria-hidden="true">0</div>
      <div class="counter" id="counter" aria-live="polite">0 trains dispatched</div>
    </main>

    <script>
      const TRAIN_EMOJIS = ["🚂", "🚃", "🚅", "🚋", "🚄"];
      const PUFF_CHARS = ["·", "°", "・", "∘"];
      const LANE_COUNT = 5;
      const DISPATCH_THROTTLE_MS = 120;
      const PUFF_COUNT = 4;
      const MIN_DURATION_MS = 4500;
      const MAX_DURATION_MS = 7500;

      const dispatcher = document.querySelector("#dispatcher");
      const hero = document.querySelector("#hero");
      const themeButton = document.querySelector("#theme");
      const themeColorMeta = document.querySelector("#theme-color");
      const muteButton = document.querySelector("#mute");
      const counter = document.querySelector("#counter");
      const backgroundCounter = document.querySelector("#background-counter");
      const choo = new Audio("./public/choo-choo.mp3");
      choo.preload = "auto";

      let count = 0;
      let nextId = 1;
      let lastDispatch = 0;
      let lastLane = -1;
      let lastDirection = "rtl";
      let backgroundCounterPulseTimer;
      let muted = localStorage.getItem("wtc:muted") === "1";
      let theme = localStorage.getItem("wtc:theme");

      function pick(items) {
        return items[Math.floor(Math.random() * items.length)];
      }

      function resolveTheme() {
        if (theme === "light" || theme === "dark") return theme;
        return window.matchMedia("(prefers-color-scheme: dark)").matches
          ? "dark"
          : "light";
      }

      function syncTheme() {
        const resolved = resolveTheme();
        document.documentElement.dataset.theme = resolved;
        themeButton.textContent = resolved === "dark" ? "☀️" : "🌙";
        themeButton.setAttribute(
          "aria-label",
          resolved === "dark" ? "Switch to light mode" : "Switch to dark mode",
        );
        if (themeColorMeta) {
          themeColorMeta.content = resolved === "dark" ? "#111110" : "#fbfbfa";
        }
      }

      function syncMuteButton() {
        muteButton.textContent = muted ? "🔇" : "🔊";
        muteButton.setAttribute("aria-label", muted ? "Unmute" : "Mute");
        muteButton.setAttribute("aria-pressed", String(muted));
        localStorage.setItem("wtc:muted", muted ? "1" : "0");
      }

      function updateCounter() {
        const noun = count === 1 ? "train" : "trains";
        counter.textContent = `${count} ${noun} dispatched`;
        backgroundCounter.textContent = count;
        document.title =
          count === 0 ? "welcome to conductor" : `welcome to conductor (${count})`;
      }

      function playChoo() {
        if (muted) return;
        const node = choo.cloneNode(true);
        node.volume = 0.28;
        node.play().catch(() => {});
      }

      function removeNode(event) {
        event.currentTarget.remove();
      }

      function createSteam(train, delay) {
        window.setTimeout(() => {
          const elapsed = performance.now() - train.startedAt;
          const progress = Math.min(elapsed / train.durationMs, 1);
          const puff = document.createElement("span");
          const x =
            train.direction === "ltr"
              ? -15 + 130 * progress
              : 115 - 130 * progress;

          puff.className = "steam";
          puff.textContent = pick(PUFF_CHARS);
          puff.style.left = `${x}vw`;
          puff.style.top = `${10 + train.lane * 16}vh`;
          puff.addEventListener("animationend", removeNode, { once: true });
          dispatcher.append(puff);
        }, delay);
      }

      function dispatchTrain() {
        const now = performance.now();
        if (now - lastDispatch < DISPATCH_THROTTLE_MS) return;
        lastDispatch = now;

        let lane = Math.floor(Math.random() * LANE_COUNT);
        if (lane === lastLane) lane = (lane + 1) % LANE_COUNT;
        lastLane = lane;

        const direction = lastDirection === "ltr" ? "rtl" : "ltr";
        lastDirection = direction;

        const durationMs =
          MIN_DURATION_MS + Math.random() * (MAX_DURATION_MS - MIN_DURATION_MS);
        const train = {
          id: nextId++,
          lane,
          direction,
          durationMs,
          startedAt: now,
        };

        const trainNode = document.createElement("span");
        trainNode.className = `train ${direction}`;
        trainNode.textContent = pick(TRAIN_EMOJIS);
        trainNode.style.top = `${10 + lane * 16}vh`;
        trainNode.style.animationDuration = `${durationMs}ms`;
        trainNode.addEventListener("animationend", removeNode, { once: true });
        dispatcher.append(trainNode);

        count += 1;
        hero.classList.add("dispatched");
        updateCounter();
        backgroundCounter.classList.remove("bump");
        void backgroundCounter.offsetWidth;
        backgroundCounter.classList.add("bump");
        window.clearTimeout(backgroundCounterPulseTimer);
        backgroundCounterPulseTimer = window.setTimeout(() => {
          backgroundCounter.classList.remove("bump");
        }, 260);
        playChoo();

        for (let i = 0; i < PUFF_COUNT; i += 1) {
          createSteam(train, (durationMs / (PUFF_COUNT + 1)) * (i + 1));
        }
      }

      dispatcher.addEventListener("click", dispatchTrain);
      themeButton.addEventListener("click", (event) => {
        event.stopPropagation();
        theme = resolveTheme() === "dark" ? "light" : "dark";
        localStorage.setItem("wtc:theme", theme);
        syncTheme();
      });
      muteButton.addEventListener("click", (event) => {
        event.stopPropagation();
        muted = !muted;
        syncMuteButton();
      });

      window.addEventListener("keydown", (event) => {
        if (event.code === "Space" || event.code === "Enter") {
          event.preventDefault();
          dispatchTrain();
        } else if (event.key === "m" || event.key === "M") {
          muted = !muted;
          syncMuteButton();
        }
      });

      window
        .matchMedia("(prefers-color-scheme: dark)")
        .addEventListener("change", () => {
          if (theme !== "light" && theme !== "dark") syncTheme();
        });

      syncTheme();
      syncMuteButton();
      updateCounter();
    </script>
  </body>
</html>
