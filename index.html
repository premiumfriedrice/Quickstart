<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <meta
      name="description"
      content="A tiny train dispatcher. Click anywhere to send a train chugging across the screen."
    />
    <meta property="og:title" content="welcome to conductor" />
    <meta property="og:description" content="Click anywhere to dispatch a train." />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/png" href="./public/favicon.png" />
    <title>welcome to conductor</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #151515;
        --muted: #7a7a7a;
        --faint: #d9d9d9;
        --paper: #fbfbfa;
        --panel: rgba(255, 255, 255, 0.72);
        --accent: #111;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        overflow: hidden;
        background: var(--paper);
        color: var(--ink);
        font-family:
          ui-sans-serif,
          -apple-system,
          BlinkMacSystemFont,
          "SF Pro Text",
          "Helvetica Neue",
          Helvetica,
          Arial,
          sans-serif;
        font-feature-settings: "kern";
      }

      main {
        position: relative;
        display: block;
        width: 100vw;
        min-height: 100svh;
        overflow: hidden;
        cursor: pointer;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }

      .hero {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        gap: 18px;
        padding: 32px;
        text-align: center;
        transition: opacity 600ms ease;
        pointer-events: none;
      }

      .hero.dispatched {
        opacity: 0;
      }

      .hero-inner {
        display: grid;
        gap: 18px;
        place-items: center;
      }

      .train-emoji {
        display: inline-block;
        font-size: clamp(56px, 10vw, 96px);
        line-height: 1;
        transform-origin: 50% 60%;
        pointer-events: auto;
      }

      .train-emoji:hover {
        animation: wiggle 600ms ease-in-out;
      }

      .tagline {
        max-width: 28ch;
        color: var(--muted);
        font-size: 14px;
        font-weight: 450;
        letter-spacing: 0;
        line-height: 1.5;
      }

      .train {
        position: fixed;
        left: 0;
        z-index: 1;
        font-size: clamp(38px, 6vw, 56px);
        line-height: 1;
        pointer-events: none;
        animation-fill-mode: forwards;
        animation-timing-function: linear;
        will-change: transform;
      }

      .train.ltr {
        animation-name: train-ltr;
      }

      .train.rtl {
        animation-name: train-rtl;
      }

      .steam {
        position: fixed;
        z-index: 0;
        color: #c9c9c7;
        font-size: 18px;
        pointer-events: none;
        animation: puff 1400ms ease-out forwards;
        will-change: transform, opacity;
      }

      .audio-controls {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 10;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .sound-select,
      .mute-toggle {
        display: inline-flex;
        height: 38px;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--faint);
        background: var(--panel);
        color: var(--ink);
        cursor: pointer;
        backdrop-filter: blur(14px);
        transition:
          border-color 150ms ease,
          background 150ms ease,
          transform 150ms ease;
      }

      .sound-select {
        max-width: min(44vw, 180px);
        border-radius: 999px;
        padding: 0 34px 0 14px;
        appearance: none;
        background-image:
          linear-gradient(45deg, transparent 50%, var(--muted) 50%),
          linear-gradient(135deg, var(--muted) 50%, transparent 50%);
        background-position:
          calc(100% - 17px) 16px,
          calc(100% - 12px) 16px;
        background-size:
          5px 5px,
          5px 5px;
        background-repeat: no-repeat;
        font: inherit;
        font-size: 13px;
        font-weight: 500;
      }

      .mute-toggle {
        width: 38px;
        border-radius: 999px;
        font-size: 16px;
      }

      .sound-select:hover,
      .mute-toggle:hover {
        background: #fff;
        border-color: #b8b8b8;
        transform: translateY(-1px);
      }

      .sound-select:focus-visible,
      .mute-toggle:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
      }

      .counter {
        position: fixed;
        bottom: 16px;
        left: 16px;
        z-index: 10;
        color: var(--muted);
        font-size: 13px;
        font-weight: 450;
        letter-spacing: 0;
        pointer-events: none;
      }

      @keyframes wiggle {
        0%,
        100% {
          transform: rotate(0);
        }

        25% {
          transform: translateY(-4px) rotate(-6deg);
        }

        75% {
          transform: translateY(-4px) rotate(6deg);
        }
      }

      @keyframes train-ltr {
        from {
          transform: translateX(-15vw) scaleX(-1);
        }

        to {
          transform: translateX(115vw) scaleX(-1);
        }
      }

      @keyframes train-rtl {
        from {
          transform: translateX(115vw);
        }

        to {
          transform: translateX(-15vw);
        }
      }

      @keyframes puff {
        0% {
          opacity: 0.7;
          transform: translate(0, 0) scale(0.8);
        }

        100% {
          opacity: 0;
          transform: translate(0, -40px) scale(1.4);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .hero,
        .train-emoji:hover {
          animation: none;
          transition: none;
        }

        .steam {
          display: none;
        }

        .train.ltr,
        .train.rtl {
          left: 50%;
          animation: fade-blip 1500ms ease both !important;
        }

        @keyframes fade-blip {
          0% {
            opacity: 0;
            transform: translateX(-50%) scale(0.85);
          }

          20%,
          80% {
            opacity: 1;
            transform: translateX(-50%) scale(1);
          }

          100% {
            opacity: 0;
            transform: translateX(-50%) scale(1);
          }
        }
      }
    </style>
  </head>
  <body>
    <main id="dispatcher">
      <div class="hero" id="hero">
        <div class="hero-inner">
          <span class="train-emoji" role="img" aria-label="train">🚂</span>
          <span class="tagline">Click anywhere to dispatch a train.</span>
        </div>
      </div>

      <div class="audio-controls" role="group" aria-label="Train audio controls">
        <select class="sound-select" id="sound" aria-label="Train sound"></select>

        <button
          class="mute-toggle"
          id="mute"
          type="button"
          aria-label="Mute"
          aria-pressed="false"
        >
          🔊
        </button>
      </div>

      <div class="counter" id="counter" aria-live="polite">0 trains dispatched</div>
    </main>

    <script>
      const TRAIN_EMOJIS = ["🚂", "🚃", "🚅", "🚋", "🚄"];
      const PUFF_CHARS = ["·", "°", "・", "∘"];
      const LANE_COUNT = 5;
      const DISPATCH_THROTTLE_MS = 120;
      const PUFF_COUNT = 4;
      const MIN_DURATION_MS = 4500;
      const MAX_DURATION_MS = 7500;
      const TRAIN_SOUNDS = [
        {
          id: "choo-choo",
          label: "Choo choo",
          src: "./public/choo-choo.mp3",
          volume: 0.28,
        },
        {
          id: "sf-muni",
          label: "SF Muni chime",
          src: "./public/sf-muni-inbound-train-chime.mp3",
          volume: 0.55,
        },
      ];

      const dispatcher = document.querySelector("#dispatcher");
      const hero = document.querySelector("#hero");
      const muteButton = document.querySelector("#mute");
      const soundSelect = document.querySelector("#sound");
      const counter = document.querySelector("#counter");
      const sounds = new Map(
        TRAIN_SOUNDS.map((sound) => {
          const audio = new Audio(sound.src);
          audio.preload = "auto";
          return [sound.id, { ...sound, audio }];
        }),
      );

      let count = 0;
      let nextId = 1;
      let lastDispatch = 0;
      let lastLane = -1;
      let lastDirection = "rtl";
      let muted = localStorage.getItem("wtc:muted") === "1";
      let selectedSoundId = sounds.has(localStorage.getItem("wtc:sound"))
        ? localStorage.getItem("wtc:sound")
        : TRAIN_SOUNDS[0].id;

      function pick(items) {
        return items[Math.floor(Math.random() * items.length)];
      }

      function syncMuteButton() {
        muteButton.textContent = muted ? "🔇" : "🔊";
        muteButton.setAttribute("aria-label", muted ? "Unmute" : "Mute");
        muteButton.setAttribute("aria-pressed", String(muted));
        localStorage.setItem("wtc:muted", muted ? "1" : "0");
      }

      function syncSoundSelect() {
        soundSelect.value = selectedSoundId;
        localStorage.setItem("wtc:sound", selectedSoundId);
      }

      function isControlElement(element) {
        return element instanceof Element
          && Boolean(element.closest("button, select, input, textarea, a"));
      }

      function updateCounter() {
        const noun = count === 1 ? "train" : "trains";
        counter.textContent = `${count} ${noun} dispatched`;
        document.title =
          count === 0 ? "welcome to conductor" : `welcome to conductor (${count})`;
      }

      function playTrainSound() {
        if (muted) return;
        const sound = sounds.get(selectedSoundId) ?? sounds.get(TRAIN_SOUNDS[0].id);
        const node = sound.audio.cloneNode(true);
        node.volume = sound.volume;
        node.play().catch(() => {});
      }

      function removeNode(event) {
        event.currentTarget.remove();
      }

      function createSteam(train, delay) {
        window.setTimeout(() => {
          const elapsed = performance.now() - train.startedAt;
          const progress = Math.min(elapsed / train.durationMs, 1);
          const puff = document.createElement("span");
          const x =
            train.direction === "ltr"
              ? -15 + 130 * progress
              : 115 - 130 * progress;

          puff.className = "steam";
          puff.textContent = pick(PUFF_CHARS);
          puff.style.left = `${x}vw`;
          puff.style.top = `${10 + train.lane * 16}vh`;
          puff.addEventListener("animationend", removeNode, { once: true });
          dispatcher.append(puff);
        }, delay);
      }

      function dispatchTrain() {
        const now = performance.now();
        if (now - lastDispatch < DISPATCH_THROTTLE_MS) return;
        lastDispatch = now;

        let lane = Math.floor(Math.random() * LANE_COUNT);
        if (lane === lastLane) lane = (lane + 1) % LANE_COUNT;
        lastLane = lane;

        const direction = lastDirection === "ltr" ? "rtl" : "ltr";
        lastDirection = direction;

        const durationMs =
          MIN_DURATION_MS + Math.random() * (MAX_DURATION_MS - MIN_DURATION_MS);
        const train = {
          id: nextId++,
          lane,
          direction,
          durationMs,
          startedAt: now,
        };

        const trainNode = document.createElement("span");
        trainNode.className = `train ${direction}`;
        trainNode.textContent = pick(TRAIN_EMOJIS);
        trainNode.style.top = `${10 + lane * 16}vh`;
        trainNode.style.animationDuration = `${durationMs}ms`;
        trainNode.addEventListener("animationend", removeNode, { once: true });
        dispatcher.append(trainNode);

        count += 1;
        hero.classList.add("dispatched");
        updateCounter();
        playTrainSound();

        for (let i = 0; i < PUFF_COUNT; i += 1) {
          createSteam(train, (durationMs / (PUFF_COUNT + 1)) * (i + 1));
        }
      }

      dispatcher.addEventListener("click", dispatchTrain);
      muteButton.addEventListener("click", (event) => {
        event.stopPropagation();
        muted = !muted;
        syncMuteButton();
      });
      soundSelect.addEventListener("click", (event) => {
        event.stopPropagation();
      });
      soundSelect.addEventListener("change", (event) => {
        event.stopPropagation();
        selectedSoundId = event.currentTarget.value;
        syncSoundSelect();
      });

      window.addEventListener("keydown", (event) => {
        if (isControlElement(event.target)) return;

        if (event.code === "Space" || event.code === "Enter") {
          event.preventDefault();
          dispatchTrain();
        } else if (event.key === "m" || event.key === "M") {
          muted = !muted;
          syncMuteButton();
        }
      });

      for (const sound of TRAIN_SOUNDS) {
        const option = document.createElement("option");
        option.value = sound.id;
        option.textContent = sound.label;
        soundSelect.append(option);
      }

      syncMuteButton();
      syncSoundSelect();
      updateCounter();
    </script>
  </body>
</html>
